name: HR Weekly Report Bot

on:
  schedule:
    # 매주 수요일 09:00 KST (UTC 00:00)
    - cron: '0 0 * * 3'
  workflow_dispatch: # 수동 실행 버튼 (테스트용)

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
        env:
          AGIT_WEBHOOK_URL: ${{ secrets.AGIT_WEBHOOK_URL }}
